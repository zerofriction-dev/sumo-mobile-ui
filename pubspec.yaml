name: zero_textfield
description: >-
  A reusable, themeable Flutter text field (CustomTextField) with a floating
  label, optional required marker, built-in clear button, and external error state.
version: 0.1.0
publish_to: "none" # private package — distributed via Git, not pub.dev
homepage: https://github.com/Teerapon-Thongkul/zero_textfield

environment:
  sdk: ^3.9.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
