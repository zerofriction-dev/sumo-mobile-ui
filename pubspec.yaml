name: zero_ui
description: >-
  Reusable, themeable Flutter UI widgets (ZeroTextField, ZeroDropdownSearch, ZeroButton) with a
  shared ZeroUiColors palette. Extracted from the Sumo apps.
version: 0.4.0
publish_to: "none" # private package — distributed via Git, not pub.dev
homepage: https://github.com/zerofriction-dev/zero_ui

environment:
  sdk: ^3.9.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_typeahead: ^5.2.0
  flutter_tabler_icons: ^1.43.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
